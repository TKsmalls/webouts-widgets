<!-- WebOuts Onboarding — paste into the Bricks "Code" element on webouts.com/onboarding.
     Loads the currently published version automatically; no cache lag, no hard-refresh needed.
     Publishing is a deliberate step, so work in progress never reaches a client.
     See HOW-TO-UPDATE-PAGE.md in TKsmalls/webouts-widgets. -->
<div id="wo-onboarding-root"></div>
<script>
(function () {
  var repo = 'TKsmalls/webouts-widgets', file = 'onboarding.js', branch = 'live';
  function inject(ref) {
    var s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/gh/' + repo + '@' + ref + '/' + file;
    document.head.appendChild(s);
  }
  fetch('https://api.github.com/repos/' + repo + '/commits/' + branch, { headers: { Accept: 'application/vnd.github.sha' } })
    .then(function (r) { return r.ok ? r.text() : Promise.reject(); })
    .then(function (sha) { inject(/^[0-9a-f]{40}$/.test(sha.trim()) ? sha.trim() : branch); })
    .catch(function () { inject(branch); });
})();
</script>
